<ion-content class="ion-padding">

  <app-prompt-input
    [prompt]="state.prompt()"
    [negativePrompt]="state.negativePrompt()"
    (promptChange)="state.prompt.set($event)"
    (negativePromptChange)="state.negativePrompt.set($event)">
  </app-prompt-input>

  <ion-card>
    <ion-card-header>
      <ion-card-title>Frames de Entrada</ion-card-title>
      <ion-card-subtitle>O VEO 3 irá gerar a transição entre os frames</ion-card-subtitle>
    </ion-card-header>
    <ion-card-content>

      <ion-label class="ion-margin-bottom"><strong>Primeiro Frame</strong></ion-label>
      <app-image-picker
        inputId="firstFrameInput"
        buttonLabel="Selecionar Primeiro Frame"
        buttonIcon="play-skip-back-outline"
        [imageBase64]="firstFrameBase64()"
        [imageMimeType]="firstFrameMimeType()"
        (imageSelected)="firstFrameBase64.set($event.base64); firstFrameMimeType.set($event.mimeType)">
      </app-image-picker>

      <div class="ion-margin-top">
        <ion-label><strong>Último Frame</strong></ion-label>
        <app-image-picker
          inputId="lastFrameInput"
          buttonLabel="Selecionar Último Frame"
          buttonIcon="play-skip-forward-outline"
          [imageBase64]="lastFrameBase64()"
          [imageMimeType]="lastFrameMimeType()"
          (imageSelected)="lastFrameBase64.set($event.base64); lastFrameMimeType.set($event.mimeType)">
        </app-image-picker>
      </div>

    </ion-card-content>
  </ion-card>

  <app-video-settings
    [providers]="state.PROVIDERS"
    [provider]="state.provider()"
    [models]="state.currentProviderConfig().models"
    [model]="state.model()"
    [durationOptions]="state.currentProviderConfig().durationOptions"
    [durationSeconds]="state.durationSeconds()"
    [aspectRatios]="state.currentAspectRatios()"
    [aspectRatio]="state.aspectRatio()"
    (providerChange)="state.setProvider($event)"
    (modelChange)="state.setModel($event)"
    (durationSecondsChange)="state.durationSeconds.set($event)"
    (aspectRatioChange)="state.aspectRatio.set($event)">
  </app-video-settings>

  <ion-button
    expand="block"
    [disabled]="!state.prompt() || !firstFrameBase64() || !lastFrameBase64() || state.isGenerating()"
    (click)="generate()"
    class="ion-margin">
    <ion-icon name="videocam-outline" slot="start"></ion-icon>
    {{ state.isGenerating() ? 'Gerando...' : 'Gerar Vídeo' }}
  </ion-button>

  @if (state.currentJob()) {
    <app-generation-status
      [job]="state.currentJob()"
      [statusLabel]="state.statusLabel()"
      (download)="state.download()">
    </app-generation-status>
  }

</ion-content>
